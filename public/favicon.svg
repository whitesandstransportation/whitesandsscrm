<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF5C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A962;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8964F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Outer circle with gold border -->
  <circle cx="50" cy="50" r="48" fill="url(#darkGradient)" stroke="url(#goldGradient)" stroke-width="2"/>
  
  <!-- Inner decorative ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#goldGradient)" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Stylized sand dunes / waves -->
  <g filter="url(#shadow)">
    <!-- First wave (back) -->
    <path d="M15 58 Q30 48, 50 55 Q70 62, 85 52" fill="none" stroke="url(#goldGradient)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    
    <!-- Second wave (middle) -->
    <path d="M15 52 Q35 42, 55 50 Q75 58, 85 48" fill="none" stroke="url(#goldGradient)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Third wave (front) -->
    <path d="M15 46 Q40 36, 60 45 Q80 54, 85 44" fill="none" stroke="url(#goldGradient)" stroke-width="3.5" stroke-linecap="round"/>
  </g>
  
  <!-- Letters WS stylized -->
  <text x="50" y="75" font-family="Cinzel, Georgia, serif" font-size="14" font-weight="600" fill="url(#goldGradient)" text-anchor="middle" letter-spacing="4">WS</text>
</svg>
